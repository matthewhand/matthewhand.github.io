document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

\">&#8617; home<\/span><\/a>\n<x-dc>\n<helmet>\n  <style>/* ============================================================================\n   PHOSPHOR \u2014 Matthew Hand Design System\n   Foundation tokens: color + type\n   Aesthetic: green-phosphor CRT terminal. Black void, glowing green text,\n   monospace everything. \"Edgelord\" hacker-terminal styling.\n   ----------------------------------------------------------------------------\n   Source brand: matthewhand.github.io (index.html)\n     bg #000  \u2022  text #0f0 / #00ff00  \u2022  Courier New monospace  \u2022  green gradient\n   This file FAITHFULLY EXTENDS that minimal source into a full system.\n   ============================================================================ */\n\n/* ---- Webfonts (self-hosted Hack + Google Fonts CDN) ----------------------\n   SUBSTITUTION NOTE: the source brand uses system \"Courier New\". This system\n   elevates to Hack (workhorse, SELF-HOSTED from user-uploaded TTFs) + VT323\n   (CRT display, CDN) + Share Tech Mono (labels, CDN). All monospace, all\n   faithful to the terminal vibe. Courier New is retained as the canonical\n   fallback in every stack. Hack ships weights 400 & 700 only.\n   --------------------------------------------------------------------------- */\n/* latin */\n@font-face {\n  font-family: 'Share Tech Mono';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"bf282810-2436-4fab-b919-02d85c96f507\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'VT323';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"088635ca-2700-4338-8550-f293297bffa3\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'VT323';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"5f3a0949-1af0-4076-877f-243bb069082d\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'VT323';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"3955c776-77f3-4656-804c-6501a0aaaf32\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n\n/* Hack \u2014 self-hosted brand workhorse mono (user-uploaded TTFs) */\n@font-face {\n  font-family: 'Hack';\n  src: url(\"7baf7495-15d3-4020-b289-75a7d2bf59b7\") format('truetype');\n  font-weight: 400; font-style: normal; font-display: swap;\n}\n@font-face {\n  font-family: 'Hack';\n  src: url(\"cf9ca1f1-f146-42fa-969e-8dd1d00dcca3\") format('truetype');\n  font-weight: 400; font-style: italic; font-display: swap;\n}\n@font-face {\n  font-family: 'Hack';\n  src: url(\"6ef3238f-ef7e-4910-8952-b02b341a6e98\") format('truetype');\n  font-weight: 700; font-style: normal; font-display: swap;\n}\n@font-face {\n  font-family: 'Hack';\n  src: url(\"44b45446-d797-4b4b-a0ec-da94f1b41ce1\") format('truetype');\n  font-weight: 700; font-style: italic; font-display: swap;\n}\n\n:root {\n  /* ====================================================================\n     COLOR \u2014 RAW PALETTE\n     ==================================================================== */\n\n  /* --- Void (backgrounds) --- */\n  --void-0: #000000;   /* pure black \u2014 the canonical brand background      */\n  --void-1: #040804;   /* near-black, faint green cast                     */\n  --void-2: #081008;   /* raised surface / panel                          */\n  --void-3: #0b170b;   /* card / inset                                    */\n  --void-4: #102210;   /* hover surface / active row                      */\n\n  /* --- Phosphor (the green ramp) --- */\n  --green-50:  #e8ffe8;\n  --green-100: #ccffcc;  /* \"phosphor white\" \u2014 highest emphasis text      */\n  --green-200: #99ff99;\n  --green-300: #4dff4d;  /* hover / bright                                 */\n  --green-400: #1aff1a;\n  --green-500: #00ff00;  /* \u2605 BRAND PRIMARY \u2014 the canonical #0f0          */\n  --green-600: #00cc00;  /* pressed                                        */\n  --green-700: #009f1f;  /* secondary text                                 */\n  --green-800: #00700f;  /* tertiary / muted text                          */\n  --green-900: #0a3d0a;  /* hairline borders                               */\n  --green-950: #052505;  /* subtlest divider                               */\n\n  /* Matrix variant \u2014 slightly cyan-shifted phosphor for glow/display */\n  --matrix: #00ff41;\n\n  /* --- Terminal semantic accents (ANSI heritage) --- */\n  --amber:   #ffb000;   /* warning / caution \u2014 classic amber CRT          */\n  --red:     #ff3b30;   /* error / destructive / [FAIL]                   */\n  --cyan:    #00e5ff;   /* info / links-alt / highlight                   */\n  --magenta: #ff2bd6;   /* rare accent / special token                    */\n  --blue:    #4d8bff;   /* keyword-blue, used sparingly in code           */\n\n  /* --- Glow tints (box-shadow / text-shadow colors) --- */\n  --glow-green:  rgba(0, 255, 0, 0.55);\n  --glow-soft:   rgba(0, 255, 0, 0.22);\n  --glow-amber:  rgba(255, 176, 0, 0.45);\n  --glow-red:    rgba(255, 59, 48, 0.45);\n\n  /* ====================================================================\n     COLOR \u2014 SEMANTIC ROLES\n     ==================================================================== */\n  --bg:           var(--void-0);\n  --bg-raised:    var(--void-2);\n  --bg-card:      var(--void-3);\n  --bg-hover:     var(--void-4);\n\n  --fg-bright:    var(--green-100);  /* headings, emphasis                 */\n  --fg:           var(--green-500);  /* default body text                  */\n  --fg-secondary: var(--green-700);  /* labels, metadata                   */\n  --fg-muted:     var(--green-800);  /* timestamps, disabled, comments     */\n\n  --border:       var(--green-900);\n  --border-bright:var(--green-700);\n  --divider:      var(--green-950);\n\n  --link:         var(--green-500);\n  --link-hover:   var(--green-300);\n\n  --accent:       var(--green-500);\n  --accent-amber: var(--amber);\n  --accent-cyan:  var(--cyan);\n\n  --success: var(--green-500);\n  --warning: var(--amber);\n  --danger:  var(--red);\n  --info:    var(--cyan);\n\n  /* Selection highlight \u2014 inverted phosphor block, like a real terminal */\n  --selection-bg: var(--green-500);\n  --selection-fg: var(--void-0);\n\n  /* ====================================================================\n     TYPE \u2014 FAMILIES\n     ==================================================================== */\n  --font-display: 'VT323', 'Courier New', monospace;        /* CRT headers */\n  --font-mono:    'Hack', 'Courier New', monospace;         /* workhorse  */\n  --font-label:   'Share Tech Mono', 'Courier New', monospace;/* eyebrows  */\n  --font-system:  'Courier New', Courier, monospace;        /* source-true */\n\n  /* ====================================================================\n     TYPE \u2014 SCALE  (monospace, generous line-height for terminal feel)\n     ==================================================================== */\n  --text-xs:   0.75rem;   /* 12px \u2014 metadata, footnotes        */\n  --text-sm:   0.875rem;  /* 14px \u2014 secondary body             */\n  --text-base: 1rem;      /* 16px \u2014 body                       */\n  --text-md:   1.125rem;  /* 18px \u2014 lead body                  */\n  --text-lg:   1.375rem;  /* 22px \u2014 h4                         */\n  --text-xl:   1.75rem;   /* 28px \u2014 h3                         */\n  --text-2xl:  2.25rem;   /* 36px \u2014 h2                         */\n  --text-3xl:  3rem;      /* 48px \u2014 h1                         */\n  --text-4xl:  4.5rem;    /* 72px \u2014 display                    */\n  --text-5xl:  7rem;      /* 112px \u2014 hero (VT323 shines big)   */\n\n  --leading-tight:  1.1;\n  --leading-snug:   1.3;\n  --leading-normal: 1.6;\n  --leading-loose:  1.9;\n\n  --tracking-tight:  -0.01em;\n  --tracking-normal: 0;\n  --tracking-wide:   0.08em;\n  --tracking-caps:   0.18em;  /* uppercase Share Tech Mono labels */\n\n  /* ====================================================================\n     SPACING  (8px base grid, terminal-cell friendly)\n     ==================================================================== */\n  --space-1: 4px;\n  --space-2: 8px;\n  --space-3: 12px;\n  --space-4: 16px;\n  --space-5: 24px;\n  --space-6: 32px;\n  --space-7: 48px;\n  --space-8: 64px;\n  --space-9: 96px;\n  --space-10: 128px;\n\n  /* ====================================================================\n     RADII  (terminals are SQUARE \u2014 radii are near-zero by design)\n     ==================================================================== */\n  --radius-0: 0;       /* default \u2014 hard corners, true to CRT             */\n  --radius-1: 2px;     /* barely-there softening                          */\n  --radius-2: 4px;     /* inputs / chips, max in normal use               */\n  --radius-pill: 999px;/* reserved for status dots only                   */\n\n  /* ====================================================================\n     BORDERS\n     ==================================================================== */\n  --border-w: 1px;\n  --border-thick: 2px;\n  --border-style: solid;\n\n  /* ====================================================================\n     ELEVATION \u2014 there are no soft drop shadows here.\n     \"Elevation\" = a phosphor GLOW. Surfaces are flat; light emits.\n     ==================================================================== */\n  --glow-0: none;\n  --glow-1: 0 0 4px var(--glow-soft);\n  --glow-2: 0 0 8px var(--glow-soft), 0 0 2px var(--glow-green);\n  --glow-3: 0 0 16px var(--glow-soft), 0 0 4px var(--glow-green);\n  --glow-text: 0 0 6px var(--glow-green);\n  --glow-text-strong: 0 0 10px var(--glow-green), 0 0 22px var(--glow-soft);\n\n  /* ====================================================================\n     MOTION\n     ==================================================================== */\n  --ease-term: steps(2, end);            /* chunky, terminal-y */\n  --ease-out:  cubic-bezier(0.2, 0.8, 0.2, 1);\n  --dur-fast: 90ms;\n  --dur-base: 160ms;\n  --dur-slow: 320ms;\n}\n\n/* ============================================================================\n   SEMANTIC ELEMENT STYLES  (opt-in: add class=\"phosphor\" to a root)\n   Use these as a reference implementation of the tokens above.\n   ============================================================================ */\n.phosphor {\n  background: var(--bg);\n  color: var(--fg);\n  font-family: var(--font-mono);\n  font-size: var(--text-base);\n  line-height: var(--leading-normal);\n  -webkit-font-smoothing: antialiased;\n}\n\n.phosphor ::selection { background: var(--selection-bg); color: var(--selection-fg); }\n\n.phosphor h1, .ph-h1 {\n  font-family: var(--font-display);\n  font-size: var(--text-4xl);\n  line-height: var(--leading-tight);\n  letter-spacing: var(--tracking-normal);\n  color: var(--fg-bright);\n  text-shadow: var(--glow-text-strong);\n  font-weight: 400;\n  margin: 0 0 var(--space-5);\n}\n.phosphor h2, .ph-h2 {\n  font-family: var(--font-display);\n  font-size: var(--text-2xl);\n  line-height: var(--leading-snug);\n  color: var(--fg-bright);\n  text-shadow: var(--glow-text);\n  font-weight: 400;\n  margin: 0 0 var(--space-4);\n}\n.phosphor h3, .ph-h3 {\n  font-family: var(--font-mono);\n  font-size: var(--text-xl);\n  line-height: var(--leading-snug);\n  color: var(--fg);\n  font-weight: 700;\n  margin: 0 0 var(--space-3);\n}\n.phosphor h4, .ph-h4 {\n  font-family: var(--font-mono);\n  font-size: var(--text-lg);\n  color: var(--fg);\n  font-weight: 500;\n  margin: 0 0 var(--space-3);\n}\n\n/* Eyebrow / kicker label \u2014 uppercase, tracked, Share Tech Mono */\n.ph-label {\n  font-family: var(--font-label);\n  font-size: var(--text-sm);\n  text-transform: uppercase;\n  letter-spacing: var(--tracking-caps);\n  color: var(--fg-secondary);\n}\n\n.phosphor p, .ph-p {\n  font-family: var(--font-mono);\n  font-size: var(--text-base);\n  line-height: var(--leading-normal);\n  color: var(--fg);\n  margin: 0 0 var(--space-4);\n  text-wrap: pretty;\n}\n\n.ph-small { font-size: var(--text-sm); color: var(--fg-secondary); }\n.ph-muted { color: var(--fg-muted); }\n\n.phosphor a, .ph-link {\n  color: var(--link);\n  text-decoration: underline;\n  text-underline-offset: 0.2em;\n  transition: color var(--dur-fast) var(--ease-out), text-shadow var(--dur-fast) var(--ease-out);\n}\n.phosphor a:hover, .ph-link:hover {\n  color: var(--link-hover);\n  text-shadow: var(--glow-text);\n}\n\n/* Inline code / kbd */\n.ph-code {\n  font-family: var(--font-mono);\n  font-size: 0.95em;\n  background: var(--void-2);\n  border: var(--border-w) solid var(--border);\n  padding: 0.1em 0.4em;\n  color: var(--green-300);\n}\n\n/* The signature brand gradient text (from source index.html) */\n.ph-gradient {\n  background: linear-gradient(90deg, #0f0, #00ff00, #0f0);\n  -webkit-background-clip: text;\n  background-clip: text;\n  -webkit-text-fill-color: transparent;\n}\n<\/style>\n  <style>/* PHOSPHOR \u2014 Portal UI Kit \u00b7 styles */\n*{box-sizing:border-box}\nhtml,body{margin:0;padding:0}\nbody{\n  background:#000;color:var(--fg);font-family:var(--font-mono);\n  min-height:100vh;-webkit-font-smoothing:antialiased;\n}\n::selection{background:var(--green-500);color:#000}\na{color:var(--link);text-decoration:underline;text-underline-offset:.2em}\n\n/* ---- CRT overlays ---- */\n.crt{position:fixed;inset:0;pointer-events:none;z-index:60}\n.crt-scan{position:absolute;inset:0;background:repeating-linear-gradient(0deg,rgba(0,255,0,.05) 0 1px,transparent 1px 4px)}\n.crt-vignette{position:absolute;inset:0;background:radial-gradient(ellipse at center,transparent 45%,rgba(0,0,0,.7) 100%)}\n.crt-flicker{position:absolute;inset:0;background:rgba(0,255,0,.025);animation:flick 6s steps(1) infinite}\n@keyframes flick{0%,96%,100%{opacity:0}97%,99%{opacity:1}98%{opacity:.3}}\n.matrix{position:fixed;inset:0;width:100%;height:100%;z-index:0;pointer-events:none}\n\n.cursor{display:inline-block;width:.55em;height:1.05em;background:var(--green-500);\n  box-shadow:0 0 6px var(--glow-green);vertical-align:-2px;margin-left:2px;animation:blink 1s steps(1) infinite}\n@keyframes blink{50%{opacity:0}}\n\n/* ---- Boot ---- */\n.boot{position:fixed;inset:0;background:#000;z-index:100;padding:8vh 8vw;font-size:14px;line-height:1.8;color:var(--green-500)}\n.boot .ok{color:var(--green-300)} .boot .dim{color:var(--green-800)} .boot .amb{color:var(--amber)}\n.boot.fade{animation:bootout .5s ease forwards}\n@keyframes bootout{to{opacity:0;visibility:hidden}}\n\n/* ---- Layout ---- */\n.app{position:relative;z-index:10;max-width:1080px;margin:0 auto;padding:0 24px 80px;min-height:100vh}\n\n/* ---- Status bar ---- */\n.statusbar{position:sticky;top:0;z-index:40;display:flex;justify-content:space-between;align-items:center;\n  padding:10px 4px;margin-bottom:40px;border-bottom:1px solid var(--green-900);\n  background:linear-gradient(180deg,rgba(0,0,0,.92),rgba(0,0,0,.7));backdrop-filter:blur(2px);\n  font-family:var(--font-label);font-size:12px;text-transform:uppercase;letter-spacing:.1em;color:var(--green-700)}\n.sb-left,.sb-right{display:flex;align-items:center;gap:10px}\n.sb-dot{width:8px;height:8px;border-radius:50%;background:var(--green-500);box-shadow:0 0 8px var(--green-500);animation:pulse 2s infinite}\n@keyframes pulse{50%{opacity:.4}}\n.sb-tag{color:var(--green-300)} .sb-path{color:var(--green-800)} .sb-sep{opacity:.4}\n\n/* ---- Hero ---- */\n.hero{padding:48px 0 56px;text-align:center}\n.hero-kicker{display:block;margin-bottom:18px}\n.hero-title{font-family:var(--font-display);font-size:clamp(48px,9vw,104px);line-height:.92;margin:0;\n  filter:drop-shadow(0 0 14px rgba(0,255,0,.4))}\n.hero-tag{font-size:15px;color:var(--green-500);margin-top:20px;min-height:1.4em}\n\n/* ---- Project grid ---- */\n.grid-label{font-family:var(--font-label);font-size:12px;color:var(--green-700);text-transform:uppercase;letter-spacing:.14em;margin:0 0 18px}\n.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}\n@media(max-width:720px){.grid{grid-template-columns:1fr}}\n.pcard{text-align:left;background:var(--void-3);border:1px solid var(--green-900);padding:20px;cursor:pointer;\n  font-family:var(--font-mono);color:var(--fg);transition:border-color .12s,box-shadow .12s,transform .12s;border-radius:0}\n.pcard:hover{border-color:var(--green-700);box-shadow:0 0 18px rgba(0,255,0,.16),inset 0 0 16px rgba(0,255,0,.04)}\n.pcard:active{transform:translateY(1px)}\n.pcard-top{display:flex;align-items:center;gap:8px;margin-bottom:10px}\n.pcard-arrow{color:var(--green-500)}\n.pcard-name{font-size:17px;font-weight:700;color:var(--green-100)}\n.pcard-ext{margin-left:auto;color:var(--green-800);font-size:13px}\n.pcard-desc{font-size:13px;color:var(--green-700);line-height:1.55;margin:0 0 16px}\n.pcard-meta{display:flex;align-items:center;gap:14px;font-family:var(--font-label);font-size:11px;\n  text-transform:uppercase;letter-spacing:.06em;color:var(--green-800)}\n.pcard-lang{display:flex;align-items:center;gap:6px}\n.pcard-langdot{width:8px;height:8px;border-radius:50%}\n.pcard-status{margin-left:auto}\n.pcard-status.ok{color:var(--green-300)} .pcard-status.warn{color:var(--amber)} .pcard-status.beta{color:var(--cyan)}\n\n/* ---- Modal ---- */\n.modal-scrim{position:fixed;inset:0;z-index:80;background:rgba(0,0,0,.78);backdrop-filter:blur(3px);\n  display:flex;align-items:center;justify-content:center;padding:24px;animation:fadein .15s ease}\n@keyframes fadein{from{opacity:0}}\n.modal{width:min(720px,100%);max-height:84vh;background:#000;border:1px solid var(--green-700);\n  box-shadow:0 0 40px rgba(0,255,0,.2);display:flex;flex-direction:column}\n.modal-bar{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--green-900);background:var(--void-2)}\n.win-dots{display:flex;gap:6px}.wd{width:11px;height:11px;border-radius:50%;border:1px solid}\n.wd1{border-color:var(--red)}.wd2{border-color:var(--amber)}.wd3{border-color:var(--green-500)}\n.modal-title{font-family:var(--font-label);font-size:12px;color:var(--green-700);text-transform:uppercase;letter-spacing:.08em}\n.modal-x{margin-left:auto;background:none;border:none;color:var(--green-800);font-family:var(--font-label);font-size:12px;cursor:pointer;text-transform:uppercase}\n.modal-x:hover{color:var(--green-300)}\n.modal-body{padding:18px 20px;overflow:auto;font-size:13px;line-height:1.7}\n.ml{margin-bottom:4px}.ml.dim{color:var(--green-800)}\n.ml-pre{font-family:var(--font-mono);white-space:pre-wrap;color:var(--green-300);margin:12px 0 0;line-height:1.7}\n.modal-actions{display:flex;gap:12px;margin-top:24px}\n.btn-primary{background:var(--green-500);color:#000;border:1px solid var(--green-500);font-weight:700;\n  font-family:var(--font-mono);font-size:13px;padding:10px 18px;text-decoration:none;cursor:pointer;\n  box-shadow:0 0 10px rgba(0,255,0,.3)}\n.btn-primary:hover{background:var(--green-300);box-shadow:0 0 16px rgba(0,255,0,.5)}\n.btn-ghost{background:transparent;color:var(--green-500);border:1px solid var(--green-700);\n  font-family:var(--font-mono);font-size:13px;padding:10px 18px;cursor:pointer}\n.btn-ghost:hover{border-color:var(--green-500);color:var(--green-300);box-shadow:0 0 10px rgba(0,255,0,.25)}\n\n/* ---- Footer ---- */\n.footer{text-align:center;margin-top:64px;color:var(--green-700);font-size:13px}\n.footer-line{display:block;color:var(--green-900);overflow:hidden;white-space:nowrap;margin-bottom:18px}\n.footer-sig{font-family:var(--font-label);font-size:11px;text-transform:uppercase;letter-spacing:.12em;margin-top:8px}\n<\/style>\n  <script src=\"70fbe2e4-7482-4fd2-93eb-8cd8a73c2fc9\"><\/script>\n  <style>\n    html,body{margin:0;padding:0;background:#000;}\n    @keyframes cc-blink{50%{opacity:0}}\n    @keyframes cc-pulse{50%{opacity:.4}}\n    @keyframes cc-dash{to{background-position:200% 0}}\n  <\/style>\n<\/helmet>\n\n<div class=\"phosphor\" style=\"position:relative; min-height:100vh; background:#000; color:var(--fg); font-family:var(--font-mono); overflow:hidden; --accent:{{ accentColor }};\">\n\n  <canvas ref=\"{{ setCanvas }}\" style=\"position:fixed; inset:0; width:100%; height:100%; z-index:0; pointer-events:none;\"><\/canvas>\n\n  <sc-if value=\"{{ scanlines }}\" hint-placeholder-val=\"{{ true }}\">\n    <div aria-hidden=\"true\" style=\"position:fixed; inset:0; pointer-events:none; z-index:60;\">\n      <div style=\"position:absolute; inset:0; background:repeating-linear-gradient(0deg,rgba(0,255,0,.05) 0 1px,transparent 1px 4px);\"><\/div>\n      <div style=\"position:absolute; inset:0; background:radial-gradient(ellipse at center,transparent 45%,rgba(0,0,0,.7) 100%);\"><\/div>\n    <\/div>\n  <\/sc-if>\n\n  <!-- ===== STATUS BAR ===== -->\n  <div style=\"position:sticky; top:0; z-index:40; display:flex; justify-content:space-between; align-items:center; padding:11px 24px; border-bottom:1px solid var(--green-900); background:linear-gradient(180deg,rgba(0,0,0,.92),rgba(0,0,0,.72)); backdrop-filter:blur(2px); font-family:var(--font-label); font-size:12px; text-transform:uppercase; letter-spacing:.1em; color:var(--green-700);\">\n    <div style=\"display:flex; align-items:center; gap:10px;\">\n      <span style=\"width:8px; height:8px; border-radius:50%; background:var(--green-500); box-shadow:0 0 8px var(--green-500); animation:cc-pulse 2s infinite;\"><\/span>\n      <span style=\"color:var(--green-300);\">[ONLINE]<\/span>\n      <span style=\"opacity:.4;\">~<\/span>\n      <span style=\"color:var(--green-800);\">user@matthewhand:~$&nbsp;chatty-commander<\/span>\n    <\/div>\n    <a href=\"https://github.com/matthewhand/chatty-commander\" target=\"_blank\" rel=\"noopener\" style=\"color:var(--green-700); text-decoration:none; letter-spacing:.1em;\">[ GITHUB ]<\/a>\n  <\/div>\n\n  <div style=\"position:relative; z-index:10; max-width:1040px; margin:0 auto; padding:0 24px 0;\">\n\n    <!-- ===== HERO ===== -->\n    <section style=\"padding:64px 0 40px; text-align:center;\">\n      <span style=\"display:inline-block; font-family:var(--font-label); font-size:13px; text-transform:uppercase; letter-spacing:.18em; color:var(--accent,var(--green-500)); margin-bottom:22px;\">// voice control \u00b7 openWakeWord<\/span>\n      <h1 style=\"font-family:var(--font-display); font-size:clamp(46px,8.5vw,96px); line-height:.92; margin:0; color:var(--green-100); text-shadow:0 0 10px var(--glow-green),0 0 26px var(--glow-soft); filter:drop-shadow(0 0 14px rgba(0,255,0,.35));\">Voice control for your<br>local AI setup.<\/h1>\n      <p style=\"font-size:16px; line-height:1.6; color:var(--green-500); max-width:560px; margin:22px auto 0;\">Wake word detection that actually does useful system and network things. Speak the word, fire the action \u2014 no cloud, no keyboard.<\/p>\n\n      <!-- terminal demo -->\n      <div style=\"max-width:560px; margin:34px auto 0; text-align:left; border:1px solid var(--green-900); background:var(--void-2); box-shadow:inset 0 0 24px rgba(0,255,0,.04);\">\n        <div style=\"display:flex; align-items:center; gap:8px; padding:9px 13px; border-bottom:1px solid var(--green-900); background:var(--void-3);\">\n          <span style=\"width:10px; height:10px; border-radius:50%; border:1px solid var(--red);\"><\/span>\n          <span style=\"width:10px; height:10px; border-radius:50%; border:1px solid var(--amber);\"><\/span>\n          <span style=\"width:10px; height:10px; border-radius:50%; border:1px solid var(--green-500);\"><\/span>\n          <span style=\"margin-left:6px; font-family:var(--font-label); font-size:11px; text-transform:uppercase; letter-spacing:.1em; color:var(--green-800);\">wake.log<\/span>\n        <\/div>\n        <div style=\"padding:16px 16px 18px; font-size:14px; line-height:1.8;\">\n          <div style=\"color:var(--green-800);\">~$ chatty-commander run<\/div>\n          <div style=\"color:var(--green-700);\">&gt; listening for wake word<span style=\"color:var(--green-300);\"> \u2713<\/span><\/div>\n          <div style=\"color:var(--green-100); margin-top:2px;\">&gt; \"<span style=\"color:var(--accent,var(--green-300));\">{{ typed }}<\/span><span style=\"display:inline-block; width:9px; height:17px; background:var(--green-500); box-shadow:0 0 6px var(--glow-green); vertical-align:-3px; margin-left:1px; animation:cc-blink 1s steps(1) infinite;\"><\/span>\"<\/div>\n        <\/div>\n      <\/div>\n\n      <div style=\"display:flex; gap:14px; justify-content:center; flex-wrap:wrap; margin-top:34px;\">\n        <a href=\"#start\" class=\"btn-primary\" style=\"text-decoration:none; display:inline-flex; align-items:center; white-space:nowrap; color:#000;\">$ Get started<\/a>\n        <a href=\"https://github.com/matthewhand/chatty-commander\" target=\"_blank\" rel=\"noopener\" class=\"btn-ghost\" style=\"text-decoration:none; display:inline-flex; align-items:center; white-space:nowrap;\">View on GitHub<\/a>\n      <\/div>\n    <\/section>\n\n    <!-- ===== PROBLEM ===== -->\n    <section style=\"padding:80px 0; border-top:1px solid var(--green-950);\">\n      <span style=\"display:block; font-family:var(--font-label); font-size:13px; text-transform:uppercase; letter-spacing:.18em; color:var(--green-700); margin-bottom:14px;\">// the problem<\/span>\n      <h2 style=\"font-family:var(--font-display); font-size:clamp(30px,4.5vw,44px); line-height:1.05; color:var(--green-100); text-shadow:var(--glow-text); margin:0 0 28px; max-width:760px;\">Powerful local agents. Still reaching for the keyboard.<\/h2>\n      <div style=\"display:grid; grid-template-columns:repeat(auto-fit,minmax(250px,1fr)); gap:16px;\">\n        <div style=\"border:1px solid var(--green-900); background:var(--void-3); padding:20px;\">\n          <div style=\"color:var(--red); font-size:18px; margin-bottom:10px;\">\u2717<\/div>\n          <p style=\"margin:0; font-size:14px; line-height:1.6; color:var(--green-700);\">Most wake-word solutions either do almost nothing useful \u2014 or pipe everything to the cloud.<\/p>\n        <\/div>\n        <div style=\"border:1px solid var(--green-900); background:var(--void-3); padding:20px;\">\n          <div style=\"color:var(--red); font-size:18px; margin-bottom:10px;\">\u2717<\/div>\n          <p style=\"margin:0; font-size:14px; line-height:1.6; color:var(--green-700);\">You run capable local agents and tools, but still drive them by hand with keyboard and mouse.<\/p>\n        <\/div>\n        <div style=\"border:1px solid var(--green-900); background:var(--void-3); padding:20px;\">\n          <div style=\"color:var(--red); font-size:18px; margin-bottom:10px;\">\u2717<\/div>\n          <p style=\"margin:0; font-size:14px; line-height:1.6; color:var(--green-700);\">There's a gap between having powerful local automation and triggering it naturally with your voice.<\/p>\n        <\/div>\n      <\/div>\n    <\/section>\n\n    <!-- ===== SOLUTION + FLOW ===== -->\n    <section style=\"padding:80px 0; border-top:1px solid var(--green-950);\">\n      <span style=\"display:block; font-family:var(--font-label); font-size:13px; text-transform:uppercase; letter-spacing:.18em; color:var(--accent,var(--green-500)); margin-bottom:14px;\">// the solution<\/span>\n      <h2 style=\"font-family:var(--font-display); font-size:clamp(30px,4.5vw,44px); line-height:1.05; color:var(--green-100); text-shadow:var(--glow-text); margin:0 0 16px; max-width:760px;\">A thin voice layer over the setup you already run.<\/h2>\n      <p style=\"font-size:16px; line-height:1.65; color:var(--green-500); max-width:680px; margin:0 0 40px;\">chatty-commander listens locally with openWakeWord. When it hears your word, it fires real actions \u2014 shell commands, API calls, agent invocations, service control. Everything stays on your machine.<\/p>\n\n      <!-- flow -->\n      <div style=\"display:flex; align-items:stretch; gap:14px; flex-wrap:wrap;\">\n        <div style=\"flex:1 1 200px; border:1px solid var(--green-900); background:var(--void-2); padding:20px;\">\n          <div style=\"font-family:var(--font-label); font-size:11px; text-transform:uppercase; letter-spacing:.14em; color:var(--green-800); margin-bottom:12px;\">01 \u00b7 wake word<\/div>\n          <div style=\"font-size:18px; color:var(--green-100);\">\"hey computer\"<\/div>\n          <div style=\"font-size:13px; color:var(--green-700); margin-top:8px;\">you speak the configured phrase<\/div>\n        <\/div>\n        <div style=\"display:flex; align-items:center; justify-content:center; flex:0 0 auto; color:var(--accent,var(--green-500)); font-size:22px; text-shadow:0 0 8px var(--glow-green);\">\u25b6<\/div>\n        <div style=\"flex:1 1 200px; border:1px solid var(--green-900); background:var(--void-2); padding:20px;\">\n          <div style=\"font-family:var(--font-label); font-size:11px; text-transform:uppercase; letter-spacing:.14em; color:var(--green-800); margin-bottom:12px;\">02 \u00b7 detect (local)<\/div>\n          <div style=\"font-size:18px; color:var(--green-100);\">openWakeWord <span style=\"color:var(--green-300);\">\u2713<\/span><\/div>\n          <div style=\"font-size:13px; color:var(--green-700); margin-top:8px;\">matched on-device, no network<\/div>\n        <\/div>\n        <div style=\"display:flex; align-items:center; justify-content:center; flex:0 0 auto; color:var(--accent,var(--green-500)); font-size:22px; text-shadow:0 0 8px var(--glow-green);\">\u25b6<\/div>\n        <div style=\"flex:1 1 200px; border:1px solid var(--accent,var(--green-700)); background:var(--void-3); padding:20px; box-shadow:0 0 16px rgba(0,255,0,.12);\">\n          <div style=\"font-family:var(--font-label); font-size:11px; text-transform:uppercase; letter-spacing:.14em; color:var(--green-800); margin-bottom:12px;\">03 \u00b7 action<\/div>\n          <div style=\"font-size:15px; color:var(--green-300);\">$ agentctl start research<\/div>\n          <div style=\"font-size:13px; color:var(--green-700); margin-top:8px;\">your command runs, hands-free<\/div>\n        <\/div>\n      <\/div>\n    <\/section>\n\n    <!-- ===== CAPABILITIES ===== -->\n    <section style=\"padding:80px 0; border-top:1px solid var(--green-950);\">\n      <span style=\"display:block; font-family:var(--font-label); font-size:13px; text-transform:uppercase; letter-spacing:.18em; color:var(--green-700); margin-bottom:14px;\">// key capabilities<\/span>\n      <h2 style=\"font-family:var(--font-display); font-size:clamp(30px,4.5vw,44px); line-height:1.05; color:var(--green-100); text-shadow:var(--glow-text); margin:0 0 32px;\">What it does<\/h2>\n      <div style=\"display:grid; grid-template-columns:repeat(auto-fit,minmax(248px,1fr)); gap:16px;\">\n\n        <div style=\"border:1px solid var(--green-900); background:var(--void-3); padding:22px; transition:border-color .12s,box-shadow .12s;\" style-hover=\"border:1px solid var(--green-700); background:var(--void-3); padding:22px; box-shadow:0 0 18px rgba(0,255,0,.14);\">\n          <div style=\"color:var(--accent,var(--green-300)); font-size:18px; margin-bottom:12px;\">~<\/div>\n          <div style=\"font-size:16px; font-weight:700; color:var(--green-100); margin-bottom:7px;\">Local wake word<\/div>\n          <p style=\"margin:0; font-size:13px; line-height:1.6; color:var(--green-700);\">Detection runs on-device via openWakeWord. Nothing is streamed off the machine.<\/p>\n        <\/div>\n\n        <div style=\"border:1px solid var(--green-900); background:var(--void-3); padding:22px; transition:border-color .12s,box-shadow .12s;\" style-hover=\"border:1px solid var(--green-700); background:var(--void-3); padding:22px; box-shadow:0 0 18px rgba(0,255,0,.14);\">\n          <div style=\"color:var(--accent,var(--green-300)); font-size:18px; margin-bottom:12px;\">$<\/div>\n          <div style=\"font-size:16px; font-weight:700; color:var(--green-100); margin-bottom:7px;\">Run system commands<\/div>\n          <p style=\"margin:0; font-size:13px; line-height:1.6; color:var(--green-700);\">Map a phrase to any shell command. Scripts, services, processes \u2014 whatever you'd type.<\/p>\n        <\/div>\n\n        <div style=\"border:1px solid var(--green-900); background:var(--void-3); padding:22px; transition:border-color .12s,box-shadow .12s;\" style-hover=\"border:1px solid var(--green-700); background:var(--void-3); padding:22px; box-shadow:0 0 18px rgba(0,255,0,.14);\">\n          <div style=\"color:var(--accent,var(--green-300)); font-size:18px; margin-bottom:12px;\">\u25b8<\/div>\n          <div style=\"font-size:16px; font-weight:700; color:var(--green-100); margin-bottom:7px;\">Network &amp; API actions<\/div>\n          <p style=\"margin:0; font-size:13px; line-height:1.6; color:var(--green-700);\">Hit local endpoints, poke a homelab service, or call an API on trigger.<\/p>\n        <\/div>\n\n        <div style=\"border:1px solid var(--green-900); background:var(--void-3); padding:22px; transition:border-color .12s,box-shadow .12s;\" style-hover=\"border:1px solid var(--green-700); background:var(--void-3); padding:22px; box-shadow:0 0 18px rgba(0,255,0,.14);\">\n          <div style=\"color:var(--accent,var(--green-300)); font-size:18px; margin-bottom:12px;\">\u00bb<\/div>\n          <div style=\"font-size:16px; font-weight:700; color:var(--green-100); margin-bottom:7px;\">Agent integration<\/div>\n          <p style=\"margin:0; font-size:13px; line-height:1.6; color:var(--green-700);\">Kick off local AI agents and tools by voice instead of switching to a terminal.<\/p>\n        <\/div>\n\n        <div style=\"border:1px solid var(--green-900); background:var(--void-3); padding:22px; transition:border-color .12s,box-shadow .12s;\" style-hover=\"border:1px solid var(--green-700); background:var(--void-3); padding:22px; box-shadow:0 0 18px rgba(0,255,0,.14);\">\n          <div style=\"color:var(--accent,var(--green-300)); font-size:18px; margin-bottom:12px;\">#<\/div>\n          <div style=\"font-size:16px; font-weight:700; color:var(--green-100); margin-bottom:7px;\">Configurable<\/div>\n          <p style=\"margin:0; font-size:13px; line-height:1.6; color:var(--green-700);\">Wake words and actions live in a simple config file. Add or change them in seconds.<\/p>\n        <\/div>\n\n        <div style=\"border:1px solid var(--green-900); background:var(--void-3); padding:22px; transition:border-color .12s,box-shadow .12s;\" style-hover=\"border:1px solid var(--green-700); background:var(--void-3); padding:22px; box-shadow:0 0 18px rgba(0,255,0,.14);\">\n          <div style=\"color:var(--accent,var(--green-300)); font-size:18px; margin-bottom:12px;\">\u25cf<\/div>\n          <div style=\"font-size:16px; font-weight:700; color:var(--green-100); margin-bottom:7px;\">Lightweight<\/div>\n          <p style=\"margin:0; font-size:13px; line-height:1.6; color:var(--green-700);\">A focused Python tool, not a framework. Easy to run persistently in the background.<\/p>\n        <\/div>\n\n      <\/div>\n    <\/section>\n\n    <!-- ===== USE CASES ===== -->\n    <section style=\"padding:80px 0; border-top:1px solid var(--green-950);\">\n      <span style=\"display:block; font-family:var(--font-label); font-size:13px; text-transform:uppercase; letter-spacing:.18em; color:var(--green-700); margin-bottom:14px;\">// in practice<\/span>\n      <h2 style=\"font-family:var(--font-display); font-size:clamp(30px,4.5vw,44px); line-height:1.05; color:var(--green-100); text-shadow:var(--glow-text); margin:0 0 28px;\">Say it, and it runs<\/h2>\n      <div style=\"border:1px solid var(--green-900); background:var(--void-2); font-size:14px; line-height:1.7;\">\n        <div style=\"display:flex; align-items:center; gap:8px; padding:9px 14px; border-bottom:1px solid var(--green-900); background:var(--void-3); font-family:var(--font-label); font-size:11px; text-transform:uppercase; letter-spacing:.1em; color:var(--green-800);\">~$ chatty-commander \u2014 live<\/div>\n        <div style=\"padding:18px 18px 20px;\">\n          <div style=\"display:flex; gap:12px; flex-wrap:wrap; padding:9px 0; border-bottom:1px dashed var(--green-950);\">\n            <span style=\"color:var(--green-100); flex:1 1 280px;\">\"hey computer, start the research agent\"<\/span>\n            <span style=\"color:var(--accent,var(--green-500));\">\u25b8<\/span>\n            <span style=\"color:var(--green-700); flex:1 1 220px;\">$ agentctl start research<\/span>\n          <\/div>\n          <div style=\"display:flex; gap:12px; flex-wrap:wrap; padding:9px 0; border-bottom:1px dashed var(--green-950);\">\n            <span style=\"color:var(--green-100); flex:1 1 280px;\">\"computer, check the cameras\"<\/span>\n            <span style=\"color:var(--accent,var(--green-500));\">\u25b8<\/span>\n            <span style=\"color:var(--green-700); flex:1 1 220px;\">$ curl -s localhost:8080/cams/snapshot<\/span>\n          <\/div>\n          <div style=\"display:flex; gap:12px; flex-wrap:wrap; padding:9px 0; border-bottom:1px dashed var(--green-950);\">\n            <span style=\"color:var(--green-100); flex:1 1 280px;\">\"wake up, run the backup\"<\/span>\n            <span style=\"color:var(--accent,var(--green-500));\">\u25b8<\/span>\n            <span style=\"color:var(--green-700); flex:1 1 220px;\">$ ~/scripts/backup.sh --now<\/span>\n          <\/div>\n          <div style=\"display:flex; gap:12px; flex-wrap:wrap; padding:9px 0;\">\n            <span style=\"color:var(--green-100); flex:1 1 280px;\">\"computer, deploy staging\"<\/span>\n            <span style=\"color:var(--accent,var(--green-500));\">\u25b8<\/span>\n            <span style=\"color:var(--green-700); flex:1 1 220px;\">$ make deploy ENV=staging<\/span>\n          <\/div>\n        <\/div>\n      <\/div>\n      <p style=\"font-size:14px; line-height:1.6; color:var(--green-800); margin:18px 0 0;\">\u2014 trigger local automations and kick off long jobs while your hands stay on what you're already doing.<\/p>\n    <\/section>\n\n    <!-- ===== GETTING STARTED ===== -->\n    <section id=\"start\" style=\"padding:80px 0 96px; border-top:1px solid var(--green-950);\">\n      <span style=\"display:block; font-family:var(--font-label); font-size:13px; text-transform:uppercase; letter-spacing:.18em; color:var(--accent,var(--green-500)); margin-bottom:14px;\">// getting started<\/span>\n      <h2 style=\"font-family:var(--font-display); font-size:clamp(30px,4.5vw,44px); line-height:1.05; color:var(--green-100); text-shadow:var(--glow-text); margin:0 0 32px;\">Up and running in three lines<\/h2>\n\n      <div style=\"display:grid; grid-template-columns:repeat(auto-fit,minmax(300px,1fr)); gap:20px; align-items:start;\">\n\n        <!-- install -->\n        <div style=\"border:1px solid var(--green-900); background:var(--void-2);\">\n          <div style=\"display:flex; align-items:center; gap:8px; padding:10px 14px; border-bottom:1px solid var(--green-900); background:var(--void-3);\">\n            <span style=\"font-family:var(--font-label); font-size:11px; text-transform:uppercase; letter-spacing:.1em; color:var(--green-800);\">1 \u00b7 install &amp; run<\/span>\n            <button onclick=\"{{ copyInstall }}\" style=\"margin-left:auto; background:none; border:1px solid var(--green-900); color:var(--green-700); font-family:var(--font-label); font-size:10px; text-transform:uppercase; letter-spacing:.08em; padding:4px 9px; cursor:pointer;\">{{ installLabel }}<\/button>\n          <\/div>\n          <pre style=\"margin:0; padding:18px; font-family:var(--font-mono); font-size:13.5px; line-height:1.8; color:var(--green-300); white-space:pre-wrap; overflow-x:auto;\"><span style=\"color:var(--green-800);\">$<\/span> pip install chatty-commander\n<span style=\"color:var(--green-800);\">$<\/span> chatty-commander init\n<span style=\"color:var(--green-800);\">$<\/span> chatty-commander run<\/pre>\n        <\/div>\n\n        <!-- config -->\n        <div style=\"border:1px solid var(--green-900); background:var(--void-2);\">\n          <div style=\"display:flex; align-items:center; gap:8px; padding:10px 14px; border-bottom:1px solid var(--green-900); background:var(--void-3);\">\n            <span style=\"font-family:var(--font-label); font-size:11px; text-transform:uppercase; letter-spacing:.1em; color:var(--green-800);\">2 \u00b7 config.yaml<\/span>\n            <button onclick=\"{{ copyConfig }}\" style=\"margin-left:auto; background:none; border:1px solid var(--green-900); color:var(--green-700); font-family:var(--font-label); font-size:10px; text-transform:uppercase; letter-spacing:.08em; padding:4px 9px; cursor:pointer;\">{{ configLabel }}<\/button>\n          <\/div>\n          <pre style=\"margin:0; padding:18px; font-family:var(--font-mono); font-size:13.5px; line-height:1.8; color:var(--green-300); white-space:pre-wrap; overflow-x:auto;\"><span style=\"color:var(--green-800);\"># ~/.config/chatty-commander/config.yaml<\/span>\nwake_word: <span style=\"color:var(--green-100);\">\"hey computer\"<\/span>\n\nactions:\n  research:\n    phrase: <span style=\"color:var(--green-100);\">\"start the research agent\"<\/span>\n    run:    <span style=\"color:var(--accent,var(--green-300));\">agentctl start research<\/span><\/pre>\n        <\/div>\n\n      <\/div>\n\n      <!-- custom action, full width -->\n      <div style=\"border:1px solid var(--green-900); background:var(--void-2); margin-top:20px;\">\n        <div style=\"display:flex; align-items:center; gap:8px; padding:10px 14px; border-bottom:1px solid var(--green-900); background:var(--void-3);\">\n          <span style=\"font-family:var(--font-label); font-size:11px; text-transform:uppercase; letter-spacing:.1em; color:var(--green-800);\">3 \u00b7 define a custom action<\/span>\n          <button onclick=\"{{ copyCustom }}\" style=\"margin-left:auto; background:none; border:1px solid var(--green-900); color:var(--green-700); font-family:var(--font-label); font-size:10px; text-transform:uppercase; letter-spacing:.08em; padding:4px 9px; cursor:pointer;\">{{ customLabel }}<\/button>\n        <\/div>\n        <pre style=\"margin:0; padding:18px; font-family:var(--font-mono); font-size:13.5px; line-height:1.8; color:var(--green-300); white-space:pre-wrap; overflow-x:auto;\"><span style=\"color:var(--green-800);\"># add an action \u2014 a phrase plus the command to run<\/span>\nactions:\n  backup:\n    phrase: <span style=\"color:var(--green-100);\">\"run the backup\"<\/span>\n    run:    <span style=\"color:var(--accent,var(--green-300));\">~/scripts/backup.sh --now<\/span>\n  cameras:\n    phrase: <span style=\"color:var(--green-100);\">\"check the cameras\"<\/span>\n    run:    <span style=\"color:var(--accent,var(--green-300));\">curl -s localhost:8080/cams/snapshot<\/span><\/pre>\n      <\/div>\n\n      <div style=\"display:flex; gap:14px; justify-content:center; flex-wrap:wrap; margin-top:40px;\">\n        <a href=\"https://github.com/matthewhand/chatty-commander\" target=\"_blank\" rel=\"noopener\" class=\"btn-primary\" style=\"text-decoration:none; display:inline-flex; align-items:center; white-space:nowrap; color:#000;\">$ Clone the repo<\/a>\n        <a href=\"https://github.com/matthewhand/chatty-commander#readme\" target=\"_blank\" rel=\"noopener\" class=\"btn-ghost\" style=\"text-decoration:none; display:inline-flex; align-items:center; white-space:nowrap;\">Read the docs<\/a>\n      <\/div>\n    <\/section>\n\n    <!-- ===== FOOTER ===== -->\n    <footer style=\"text-align:center; padding:48px 0 56px; border-top:1px solid var(--green-950);\">\n      <div style=\"height:1px; background:repeating-linear-gradient(90deg,var(--green-900) 0 8px,transparent 8px 16px); background-size:200% 1px; margin-bottom:22px; animation:cc-dash 18s linear infinite;\"><\/div>\n      <div style=\"font-family:var(--font-label); font-size:12px; text-transform:uppercase; letter-spacing:.12em; color:var(--green-800); margin-bottom:10px;\">// built by someone tired of reaching for the keyboard<\/div>\n      <div style=\"font-size:13px; color:var(--green-700);\">chatty-commander &nbsp;\u00b7&nbsp; <a href=\"https://github.com/matthewhand/chatty-commander\" target=\"_blank\" rel=\"noopener\" style=\"color:var(--green-500);\">github.com/matthewhand<\/a> &nbsp;\u00b7&nbsp; local &amp; open source<\/div>\n    <\/footer>\n\n  <\/div>\n<\/div>\n<\/x-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1040,&quot;height&quot;:900},&quot;scanlines&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;},&quot;matrixRain&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false,&quot;tsType&quot;:&quot;boolean&quot;},&quot;accent&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;green&quot;,&quot;options&quot;:[&quot;green&quot;,&quot;cyan&quot;,&quot;amber&quot;],&quot;tsType&quot;:&quot;string&quot;}}\">\nclass Component extends DCLogic {\n  state = { typed: '', copied: '' };\n\n  cmds = [\n    'hey computer, start the research agent',\n    'computer, check the cameras',\n    'wake up, run the backup',\n    'computer, deploy staging',\n  ];\n\n  INSTALL = '$ pip install chatty-commander\\n$ chatty-commander init\\n$ chatty-commander run';\n  CONFIG = '# ~/.config/chatty-commander/config.yaml\\nwake_word: \"hey computer\"\\n\\nactions:\\n  research:\\n    phrase: \"start the research agent\"\\n    run:    agentctl start research';\n  CUSTOM = '# add an action \u2014 a phrase plus the command to run\\nactions:\\n  backup:\\n    phrase: \"run the backup\"\\n    run:    ~/scripts/backup.sh --now\\n  cameras:\\n    phrase: \"check the cameras\"\\n    run:    curl -s localhost:8080/cams/snapshot';\n\n  ci = 0; chi = 0; dir = 1;\n\n  componentDidMount() {\n    this.tick();\n    if (this.props.matrixRain) this.startMatrix();\n  }\n  componentWillUnmount() {\n    clearTimeout(this._t); clearTimeout(this._c);\n    cancelAnimationFrame(this._raf);\n    window.removeEventListener('resize', this._onResize);\n  }\n  componentDidUpdate(prev) {\n    if (prev.matrixRain !== this.props.matrixRain) {\n      if (this.props.matrixRain) this.startMatrix(); else this.stopMatrix();\n    }\n  }\n\n  tick() {\n    const full = this.cmds[this.ci];\n    let delay;\n    this.chi += this.dir;\n    if (this.chi >= full.length) { this.chi = full.length; this.dir = -1; delay = 1700; }\n    else if (this.chi <= 0) { this.chi = 0; this.dir = 1; this.ci = (this.ci + 1) % this.cmds.length; delay = 420; }\n    else delay = this.dir > 0 ? 58 : 26;\n    this.setState({ typed: full.slice(0, this.chi) });\n    this._t = setTimeout(() => this.tick(), delay);\n  }\n\n  copy(key, text) {\n    try { navigator.clipboard && navigator.clipboard.writeText(text); } catch (e) {}\n    this.setState({ copied: key });\n    clearTimeout(this._c);\n    this._c = setTimeout(() => this.setState({ copied: '' }), 1500);\n  }\n\n  setCanvas = (el) => { this._canvas = el; };\n\n  startMatrix() {\n    const cv = this._canvas;\n    if (!cv) return;\n    const ctx = cv.getContext('2d');\n    const glyphs = '01<>$~#/\u25ae\u30a2\u30ab\u30b5\u30bf\u30ca'.split('');\n    let cols, drops;\n    const resize = () => {\n      cv.width = cv.offsetWidth; cv.height = cv.offsetHeight;\n      cols = Math.floor(cv.width / 14);\n      drops = new Array(cols).fill(0).map(() => Math.random() * -40);\n    };\n    resize();\n    this._onResize = resize;\n    window.addEventListener('resize', resize);\n    const draw = () => {\n      ctx.fillStyle = 'rgba(0,0,0,0.08)';\n      ctx.fillRect(0, 0, cv.width, cv.height);\n      ctx.font = '13px monospace';\n      for (let i = 0; i < cols; i++) {\n        ctx.fillStyle = Math.random() > 0.97 ? 'rgba(204,255,204,0.9)' : 'rgba(0,200,0,0.5)';\n        ctx.fillText(glyphs[(Math.random() * glyphs.length) | 0], i * 14, drops[i] * 16);\n        if (drops[i] * 16 > cv.height && Math.random() > 0.975) drops[i] = 0;\n        drops[i]++;\n      }\n      this._raf = requestAnimationFrame(draw);\n    };\n    draw();\n  }\n  stopMatrix() {\n    cancelAnimationFrame(this._raf);\n    if (this._canvas) {\n      const ctx = this._canvas.getContext('2d');\n      ctx && ctx.clearRect(0, 0, this._canvas.width, this._canvas.height);\n    }\n  }\n\n  renderVals() {\n    const accentMap = { green: 'var(--green-500)', cyan: 'var(--cyan)', amber: 'var(--amber)' };\n    const accent = accentMap[this.props.accent ?? 'green'] || 'var(--green-500)';\n    const c = this.state.copied;\n    return {\n      typed: this.state.typed,\n      accentColor: accent,\n      scanlines: this.props.scanlines ?? true,\n      setCanvas: this.setCanvas,\n      copyInstall: () => this.copy('install', this.INSTALL),\n      copyConfig: () => this.copy('config', this.CONFIG),\n      copyCustom: () => this.copy('custom', this.CUSTOM),\n      installLabel: c === 'install' ? '[ copied ]' : 'copy',\n      configLabel: c === 'config' ? '[ copied ]' : 'copy',\n      customLabel: c === 'custom' ? '[ copied ]' : 'copy',\n    };\n  }\n}\n<\/script>\n\n\n<\/body><\/html>"
  </script>
